<!DOCTYPE html>
<html lang="en" class="bg-stone-50 text-stone-900">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="Recipe search and pantry management web app" />
        <meta name="keywords" content="recipes, cooking, pantry, meal planning" />
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
                integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
                crossorigin="anonymous"></script>
        <title>
            {% block title %}
                Recipe Search
            {% endblock title %}
        </title>
        <link rel="stylesheet" href="{{ url_for('static', path='/css/main.css') }}" />
        {% block head %}
        {% endblock head %}
    </head>
    <body class="min-h-screen flex flex-col font-sans">
        <header class="sticky top-0 z-50 bg-stone-50/90 backdrop-blur border-b border-stone-200 px-6 py-3 flex items-center justify-between">
            <a href="{{ url_for("index") }}"
               class="font-serif text-xl font-bold tracking-tight flex items-center gap-2">
                <span class="text-amber-700">✦</span> Recipe Vault
            </a>
            <nav class="flex gap-6 text-sm text-stone-500 uppercase tracking-widest">
                <a href="{{ url_for("recipes_page") }}"
                   class="hover:text-stone-900 transition {% block nav_recipes %}{% endblock nav_recipes %}">Recipes</a>
            </nav>
        </header>
        <main class="flex-1 w-full mx-auto px-5">
            {% block content %}
            {% endblock content %}
        </main>
        {% block scripts %}
        {% endblock scripts %}
    </body>
</html>
