repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: check-yaml
          - id: end-of-file-fixer
          - id: trailing-whitespace
    - repo: https://github.com/astral-sh/ruff-pre-commit
      # Ruff version.
      rev: v0.15.15
      hooks:
          # Run the linter.
          - id: ruff-check
            args: [--fix, "--extend-select=I,E", "--ignore=F401"]
          # Run the formatter
          - id: ruff-format
